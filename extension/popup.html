<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TalkSync Meeting Overlay</title>
  <style>
    body {
      margin: 0;
      padding: 16px;
      width: 320px;
      font-family: "Segoe UI", sans-serif;
      background: #f7f4ed;
      color: #1f2937;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    p {
      margin: 0 0 10px;
      line-height: 1.5;
      color: #4b5563;
    }

    .card {
      padding: 12px;
      border-radius: 14px;
      background: white;
      border: 1px solid rgba(15, 23, 42, 0.08);
      margin-bottom: 10px;
    }

    code {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 8px;
      background: #ecfeff;
      color: #115e59;
    }
  </style>
</head>
<body>
  <h1>TalkSync Meeting Overlay</h1>
  <div class="card">
    <p>Open a supported Google Meet, Microsoft Teams, or Zoho Meeting call.</p>
    <p>The extension injects a TalkSync panel into the meeting page.</p>
    <p>Use caption mode when platform captions are available. Use audio capture as the fallback.</p>
  </div>
  <div class="card">
    <p>Backend expected at <code>http://127.0.0.1:8000</code>.</p>
  </div>
</body>
</html>
